<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OptiFlow ERP - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">

{% load static %}

<link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<div class="container">

<div class="row justify-content-center mt-5">

<div class="col-md-5">

<div class="card shadow-lg border-0 rounded-4">

<div class="card-body p-4">

<div class="d-flex justify-content-end mb-3">

<select id="themeSelect" class="form-select form-select-sm" style="width:150px;">

<option value="light">☀ Light</option>

<option value="dark">🌙 Dark</option>

<option value="system">💻 System</option>

</select>

</div>

<h2 class="text-center mb-2">

👓 OptiFlow ERP

</h2>

<p class="text-center text-muted mb-4">

Professional Optical Shop Management System

</p>

<h5 class="text-center mb-4">

🔒 Staff Login

</h5>

<form method="POST">

{% csrf_token %}

{% if error %}

<div class="alert alert-danger">

{{ error }}

</div>

{% endif %}

<div class="mb-3">

<label class="form-label fw-semibold">

Username

</label>

<input
type="text"
name="username"
class="form-control"
placeholder="Enter username"
autofocus
required>

</div>

<div class="mb-3">

<label class="form-label fw-semibold">

Password

</label>

<div class="input-group">

<input
type="password"
id="password"
name="password"
class="form-control"
placeholder="Enter password"
required>

<button
type="button"
class="btn btn-outline-secondary"
id="togglePassword">

<i class="fa-solid fa-eye"></i>

</button>

</div>

</div>

<button
type="submit"
class="btn btn-primary w-100">

🔐 Login

</button>

</form>

<hr class="my-4">

<div class="text-center">

<h5 class="fw-bold">

👤 Customer Portal

</h5>

<p class="text-muted mb-3">

Track your spectacle order using your registered phone number.

</p>

<a
href="/dashboard/track-order/"
class="btn btn-success w-100">

🔍 Track Your Order

</a>

</div>

</div>

</div>

<div class="text-center mt-3 text-muted">

<small>

© 2026 OptiFlow ERP

</small>

</div>

</div>

</div>

</div>

<script>

const password=document.getElementById("password");

const toggle=document.getElementById("togglePassword");

toggle.onclick=function(){

if(password.type==="password"){

password.type="text";

toggle.innerHTML='<i class="fa-solid fa-eye-slash"></i>';

}

else{

password.type="password";

toggle.innerHTML='<i class="fa-solid fa-eye"></i>';

}

};

const select=document.getElementById("themeSelect");

function applyTheme(theme){

if(theme==="dark"){

document.body.classList.add("dark");

}

else if(theme==="light"){

document.body.classList.remove("dark");

}

else{

const dark=window.matchMedia("(prefers-color-scheme: dark)").matches;

document.body.classList.toggle("dark",dark);

}

localStorage.setItem("theme",theme);

}

const saved=localStorage.getItem("theme") || "system";

select.value=saved;

applyTheme(saved);

select.onchange=function(){

applyTheme(select.value);

};

</script>

<script>
const themeSelect = document.getElementById("themeSelect");

function applyTheme(theme){

    document.body.classList.remove("dark");

    if(theme==="dark"){
        document.body.classList.add("dark");
    }

    else if(theme==="system"){
        if(window.matchMedia("(prefers-color-scheme: dark)").matches){
            document.body.classList.add("dark");
        }
    }

    localStorage.setItem("theme", theme);
}

const savedTheme = localStorage.getItem("theme") || "light";

applyTheme(savedTheme);

if(themeSelect){

    themeSelect.value = savedTheme;

    themeSelect.addEventListener("change", function(){
        applyTheme(this.value);
    });

}

window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function(){

    if(localStorage.getItem("theme") === "system"){
        applyTheme("system");
    }

});
</script>

</body>

</html>
