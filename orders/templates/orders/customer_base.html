<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
{% block title %}OptiFlow ERP{% endblock %}
</title>

{% load static %}

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet">

<!-- Global Styles -->
<link rel="stylesheet"
      href="{% static 'css/style.css' %}">

</head>

<body>

<!-- CUSTOMER NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm bg-white sticky-top">

    <div class="container">

        <a class="navbar-brand fw-bold fs-3 d-flex align-items-center"
           href="{% url 'track_order' %}">

            <i class="fa-solid fa-glasses text-primary me-2"></i>

            OptiFlow ERP

        </a>

    </div>

</nav>

<!-- MAIN CONTENT -->
<main class="py-4">

    <div class="container">

        {% block content %}

        {% endblock %}

    </div>

</main>

<!-- FOOTER -->
<footer>

    <div class="container">

        <div class="row align-items-center">

            <div class="col-md-6">

                <h5 class="fw-bold mb-1">

                    👓 OptiFlow ERP

                </h5>

                <p class="text-muted mb-0">

                    Professional Optical Shop Management System

                </p>

            </div>

            <div class="col-md-6 text-md-end mt-3 mt-md-0">

                <small class="text-muted">

                    © 2026 OptiFlow ERP

                    <br>

                    Built with Django & Bootstrap

                </small>

            </div>

        </div>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
