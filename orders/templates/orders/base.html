<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>
{% block title %}OptiFlow ERP{% endblock %}
</title>

<!-- Inter Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      rel="stylesheet">

<!-- Global Styles -->
{% load static %}

<link rel="stylesheet"
      href="{% static 'css/style.css' %}">

</head>

<body>

<nav class="navbar navbar-expand-lg shadow-sm bg-white sticky-top">

<div class="container">

<a class="navbar-brand fw-bold fs-3 d-flex align-items-center"
   href="{% url 'home' %}">

<i class="fa-solid fa-glasses text-primary me-2"></i>

OptiFlow ERP

</a>

<button
class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#navbarNav">

<span class="navbar-toggler-icon"></span>

</button>

<div
class="collapse navbar-collapse"
id="navbarNav">

<ul class="navbar-nav ms-4">

<li class="nav-item">

<a class="nav-link"
href="{% url 'home' %}">

<i class="fa-solid fa-house me-1"></i>

Dashboard

</a>

</li>

<li class="nav-item">

<a class="nav-link"
href="{% url 'add_customer' %}">

<i class="fa-solid fa-user-plus me-1"></i>

Add Customer

</a>

</li>

</ul>

<ul class="navbar-nav ms-auto align-items-center">

    <li class="nav-item me-3">

        <select
        id="themeSelect"
        class="form-select form-select-sm">

            <option value="light">☀ Light</option>

            <option value="dark">🌙 Dark</option>

            <option value="system">💻 System</option>

        </select>

    </li>

<li class="nav-item me-3">

<span class="fw-semibold">

👋 {{ request.user.username }}

</span>

</li>

<li class="nav-item">

<a href="{% url 'logout' %}"
class="btn btn-danger">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</a>

</li>

</ul>

</div>

</div>

</nav>

<main class="py-4">

<div class="container">

{% block content %}

{% endblock %}

</div>

</main>

<footer>

<div class="container">

<div class="row align-items-center">

<div class="col-md-6">

<h5 class="fw-bold mb-1">

👓 OptiFlow ERP

</h5>

<p class="text-muted mb-0">

Professional Optical Shop Management System

</p>

</div>

<div class="col-md-6 text-md-end mt-3 mt-md-0">

<small class="text-muted">

© 2026 OptiFlow ERP

<br>

Built with Django & Bootstrap

</small>

</div>

</div>

</div>

</footer>

<script>

const themeSelect = document.getElementById("themeSelect");

function applyTheme(theme){

    document.body.classList.remove("dark");

    if(theme==="dark"){

        document.body.classList.add("dark");

    }

    else if(theme==="system"){

        if(window.matchMedia("(prefers-color-scheme: dark)").matches){

            document.body.classList.add("dark");

        }

    }

    localStorage.setItem("theme",theme);

}

const savedTheme=localStorage.getItem("theme") || "light";

applyTheme(savedTheme);

if(themeSelect){

    themeSelect.value=savedTheme;

    themeSelect.addEventListener("change",function(){

        applyTheme(this.value);

    });

}

window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change",()=>{

    if(localStorage.getItem("theme")==="system"){

        applyTheme("system");

    }

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
